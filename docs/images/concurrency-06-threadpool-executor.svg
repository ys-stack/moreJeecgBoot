<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-label="ThreadPoolExecutor 执行流程">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1180" height="560" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">ThreadPoolExecutor：任务提交决策流程</text>
  <rect x="60" y="245" width="135" height="62" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="127" y="281" class="txt">提交任务</text>
  <rect x="250" y="245" width="170" height="62" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="335" y="271" class="txt">核心线程未满</text><text x="335" y="293" class="small">创建 core 线程</text>
  <rect x="475" y="245" width="170" height="62" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="560" y="271" class="txt">放入工作队列</text><text x="560" y="293" class="small">queue.offer</text>
  <rect x="700" y="245" width="170" height="62" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="785" y="271" class="txt">队列满且线程未满</text><text x="785" y="293" class="small">创建非核心线程</text>
  <rect x="925" y="245" width="170" height="62" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="1010" y="271" class="txt">仍无法处理</text><text x="1010" y="293" class="small">执行拒绝策略</text>
  <line x1="195" y1="276" x2="250" y2="276" class="line"/><line x1="420" y1="276" x2="475" y2="276" class="line"/><line x1="645" y1="276" x2="700" y2="276" class="line"/><line x1="870" y1="276" x2="925" y2="276" class="line"/>
  <rect x="205" y="395" width="195" height="70" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="302" y="424" class="txt">CPU 密集型</text><text x="302" y="446" class="small">线程数接近 CPU 核数</text>
  <rect x="490" y="395" width="195" height="70" rx="12" fill="#ffffff" stroke="#d97706" class="node"/><text x="587" y="424" class="txt">IO 密集型</text><text x="587" y="446" class="small">线程数可适当放大</text>
  <rect x="775" y="395" width="195" height="70" rx="12" fill="#ffffff" stroke="#e11d48" class="node"/><text x="872" y="424" class="txt">关键原则</text><text x="872" y="446" class="small">有界队列 + 监控 + 降级</text>
  <text x="590" y="520" class="small">不要直接使用 Executors.newFixedThreadPool/newCachedThreadPool 处理核心业务，队列或线程数不可控会放大故障。</text>
</svg>
