<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-label="SSM 知识地图">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 24px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.text{font:700 16px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 13px 'Microsoft YaHei',Arial,sans-serif;fill:#475569;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1180" height="620" rx="18" fill="#f8fafc"/>
  <text x="32" y="44" class="title">SSM 深度复习知识地图</text>
  <rect x="480" y="76" width="220" height="72" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/>
  <text x="590" y="108" class="text">SSM 能力模型</text><text x="590" y="130" class="small">原理 + 工程 + 排查</text>
  <rect x="70" y="220" width="180" height="82" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="160" y="252" class="text">Spring IoC</text><text x="160" y="276" class="small">容器 / Bean / 生命周期</text>
  <rect x="285" y="220" width="180" height="82" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="375" y="252" class="text">Spring AOP</text><text x="375" y="276" class="small">代理 / Advisor / 切点</text>
  <rect x="500" y="220" width="180" height="82" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="590" y="252" class="text">事务</text><text x="590" y="276" class="small">传播 / 隔离 / 失效</text>
  <rect x="715" y="220" width="180" height="82" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="805" y="252" class="text">Spring MVC</text><text x="805" y="276" class="small">DispatcherServlet 请求链</text>
  <rect x="930" y="220" width="180" height="82" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="1020" y="252" class="text">MyBatis</text><text x="1020" y="276" class="small">Executor / Statement / 映射</text>
  <rect x="170" y="410" width="190" height="82" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="265" y="442" class="text">整合机制</text><text x="265" y="466" class="small">MapperScanner / SqlSession</text>
  <rect x="405" y="410" width="190" height="82" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="500" y="442" class="text">性能优化</text><text x="500" y="466" class="small">连接池 / SQL / 缓存</text>
  <rect x="640" y="410" width="190" height="82" rx="12" fill="#ffffff" stroke="#d97706" class="node"/><text x="735" y="442" class="text">线上排查</text><text x="735" y="466" class="small">慢接口 / 事务 / 线程</text>
  <rect x="875" y="410" width="190" height="82" rx="12" fill="#ffffff" stroke="#7c3aed" class="node"/><text x="970" y="442" class="text">场景决策</text><text x="970" y="466" class="small">何时用框架能力</text>
  <line x1="590" y1="148" x2="160" y2="220" class="line"/><line x1="590" y1="148" x2="375" y2="220" class="line"/><line x1="590" y1="148" x2="590" y2="220" class="line"/><line x1="590" y1="148" x2="805" y2="220" class="line"/><line x1="590" y1="148" x2="1020" y2="220" class="line"/>
  <line x1="375" y1="302" x2="265" y2="410" class="line"/><line x1="1020" y1="302" x2="500" y2="410" class="line"/><line x1="805" y1="302" x2="735" y2="410" class="line"/><line x1="590" y1="302" x2="970" y2="410" class="line"/>
</svg>
