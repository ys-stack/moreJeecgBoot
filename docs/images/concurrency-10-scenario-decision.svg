<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-label="并发场景决策">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1180" height="560" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">并发方案怎么选：从场景约束出发</text>
  <rect x="480" y="80" width="220" height="70" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="590" y="110" class="txt">并发问题</text><text x="590" y="132" class="small">吞吐 / 延迟 / 一致性 / 成本</text>
  <rect x="90" y="230" width="185" height="78" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="182" y="260" class="txt">CPU 密集</text><text x="182" y="283" class="small">少线程 + 避免阻塞</text>
  <rect x="320" y="230" width="185" height="78" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="412" y="260" class="txt">IO 密集</text><text x="412" y="283" class="small">线程池 / 异步 / 超时</text>
  <rect x="550" y="230" width="185" height="78" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="642" y="260" class="txt">共享数据</text><text x="642" y="283" class="small">锁 / 原子类 / 队列</text>
  <rect x="780" y="230" width="185" height="78" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="872" y="260" class="txt">削峰解耦</text><text x="872" y="283" class="small">队列 / MQ / 背压</text>
  <rect x="1010" y="230" width="120" height="78" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="1070" y="260" class="txt">批处理</text><text x="1070" y="283" class="small">分片并行</text>
  <line x1="530" y1="150" x2="182" y2="230" class="line"/><line x1="565" y1="150" x2="412" y2="230" class="line"/><line x1="600" y1="150" x2="642" y2="230" class="line"/><line x1="635" y1="150" x2="872" y2="230" class="line"/><line x1="675" y1="150" x2="1070" y2="230" class="line"/>
  <rect x="160" y="405" width="230" height="72" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="275" y="434" class="txt">必须问的四个问题</text><text x="275" y="457" class="small">是否共享？是否可丢？是否要顺序？是否可重试？</text>
  <rect x="475" y="405" width="230" height="72" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="590" y="434" class="txt">工程约束</text><text x="590" y="457" class="small">超时、限流、隔离、监控、降级</text>
  <rect x="790" y="405" width="230" height="72" rx="12" fill="#ffffff" stroke="#d97706" class="node"/><text x="905" y="434" class="txt">验证方式</text><text x="905" y="457" class="small">压测、线程池指标、错误率、P99</text>
</svg>
