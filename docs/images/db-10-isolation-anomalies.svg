<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">事务隔离级别与并发异常</title>
  <desc id="desc">读未提交、读已提交、可重复读、串行化分别解决脏读、不可重复读、幻读的关系</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 32px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.grid{fill:white;stroke:#cbd5e1;stroke-width:2}
      .headbg{fill:#eaf2ff}.ok{fill:#ecfdf3}.bad{fill:#fff0f0}.mid{fill:#fff6df}.h{font:700 17px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.txt{font:400 16px Arial,"Microsoft YaHei",sans-serif;fill:#344054}.small{font:400 14px Arial,"Microsoft YaHei",sans-serif;fill:#667085}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="48" y="58">隔离级别：异常矩阵比定义更好记</text>
  <rect class="grid headbg" x="90" y="115" width="1100" height="70"/>
  <text class="h" x="125" y="158">隔离级别</text><text class="h" x="385" y="158">脏读</text><text class="h" x="570" y="158">不可重复读</text><text class="h" x="790" y="158">幻读</text><text class="h" x="980" y="158">性能/并发</text>
  <rect class="grid bad" x="90" y="185" width="250" height="90"/><text class="txt" x="125" y="238">Read Uncommitted</text>
  <rect class="grid bad" x="340" y="185" width="180" height="90"/><text class="txt" x="405" y="238">可能</text>
  <rect class="grid bad" x="520" y="185" width="220" height="90"/><text class="txt" x="600" y="238">可能</text>
  <rect class="grid bad" x="740" y="185" width="180" height="90"/><text class="txt" x="805" y="238">可能</text>
  <rect class="grid ok" x="920" y="185" width="270" height="90"/><text class="txt" x="1000" y="238">最高</text>
  <rect class="grid mid" x="90" y="275" width="250" height="90"/><text class="txt" x="125" y="328">Read Committed</text>
  <rect class="grid ok" x="340" y="275" width="180" height="90"/><text class="txt" x="405" y="328">避免</text>
  <rect class="grid bad" x="520" y="275" width="220" height="90"/><text class="txt" x="600" y="328">可能</text>
  <rect class="grid bad" x="740" y="275" width="180" height="90"/><text class="txt" x="805" y="328">可能</text>
  <rect class="grid ok" x="920" y="275" width="270" height="90"/><text class="txt" x="990" y="328">较高</text>
  <rect class="grid mid" x="90" y="365" width="250" height="90"/><text class="txt" x="125" y="418">Repeatable Read</text>
  <rect class="grid ok" x="340" y="365" width="180" height="90"/><text class="txt" x="405" y="418">避免</text>
  <rect class="grid ok" x="520" y="365" width="220" height="90"/><text class="txt" x="600" y="418">避免</text>
  <rect class="grid mid" x="740" y="365" width="180" height="90"/><text class="txt" x="770" y="418">InnoDB 多数避免</text>
  <rect class="grid mid" x="920" y="365" width="270" height="90"/><text class="txt" x="990" y="418">中高</text>
  <rect class="grid ok" x="90" y="455" width="250" height="90"/><text class="txt" x="125" y="508">Serializable</text>
  <rect class="grid ok" x="340" y="455" width="180" height="90"/><text class="txt" x="405" y="508">避免</text>
  <rect class="grid ok" x="520" y="455" width="220" height="90"/><text class="txt" x="600" y="508">避免</text>
  <rect class="grid ok" x="740" y="455" width="180" height="90"/><text class="txt" x="805" y="508">避免</text>
  <rect class="grid bad" x="920" y="455" width="270" height="90"/><text class="txt" x="990" y="508">最低</text>
  <rect class="grid" x="120" y="615" width="1040" height="74"/>
  <text class="txt" x="155" y="650">MySQL InnoDB 默认 RR：普通快照读用 Read View 保证可重复读；当前读依赖锁，范围更新会涉及间隙锁/临键锁</text>
  <text class="small" x="155" y="676">注意：SQL 标准与 MySQL 实现不完全相同，面试时要点名 InnoDB</text>
</svg>
