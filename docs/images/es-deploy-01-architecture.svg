<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-label="本地虚拟机模拟大项目 Elasticsearch 架构">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 24px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="560" rx="18" fill="#f8fafc"/>
  <text x="32" y="44" class="title">ES 实操：本地虚拟机模拟大项目搜索集群</text>
  <rect x="55" y="230" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="130" y="257" class="txt">Java 业务服务</text><text x="130" y="278" class="small">商品 / 订单 / 日志</text>
  <rect x="270" y="125" width="160" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="350" y="152" class="txt">MySQL</text><text x="350" y="173" class="small">事实数据源</text>
  <rect x="270" y="330" width="160" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="350" y="357" class="txt">同步任务</text><text x="350" y="378" class="small">全量 / 增量 / MQ</text>
  <rect x="510" y="210" width="160" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="590" y="237" class="txt">Nginx / Client</text><text x="590" y="258" class="small">统一访问入口</text>
  <rect x="750" y="85" width="150" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="825" y="112" class="txt">es01</text><text x="825" y="133" class="small">master/data</text>
  <rect x="750" y="230" width="150" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="825" y="257" class="txt">es02</text><text x="825" y="278" class="small">master/data</text>
  <rect x="750" y="375" width="150" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="825" y="402" class="txt">es03</text><text x="825" y="423" class="small">master/data</text>
  <rect x="970" y="230" width="150" height="66" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="1045" y="257" class="txt">Kibana</text><text x="1045" y="278" class="small">查询 / 管理 / 可视化</text>
  <line x1="205" y1="263" x2="270" y2="158" class="line"/><line x1="205" y1="263" x2="270" y2="363" class="line"/><line x1="430" y1="363" x2="510" y2="243" class="line"/><line x1="670" y1="243" x2="750" y2="118" class="line"/><line x1="670" y1="243" x2="750" y2="263" class="line"/><line x1="670" y1="243" x2="750" y2="408" class="line"/><line x1="900" y1="263" x2="970" y2="263" class="line"/>
  <text x="590" y="510" class="small">本地实操用 1 台虚拟机 + Docker Compose 起 3 节点 ES + Kibana；逻辑上模拟生产搜索集群、索引别名、快照、慢查询和故障恢复。</text>
</svg>
