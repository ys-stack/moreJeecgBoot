<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="540" viewBox="0 0 1160 540" role="img" aria-label="并发线上问题排查总流程">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1160" height="540" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">并发线上问题排查总流程</text>
  <rect x="55" y="230" width="140" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="125" y="257" class="txt">发现异常</text><text x="125" y="279" class="small">慢 / 卡 / CPU 高</text>
  <rect x="255" y="230" width="150" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="330" y="257" class="txt">看监控</text><text x="330" y="279" class="small">CPU/RT/队列/GC</text>
  <rect x="465" y="230" width="160" height="64" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="545" y="257" class="txt">导线程栈</text><text x="545" y="279" class="small">jcmd Thread.print</text>
  <rect x="685" y="230" width="160" height="64" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="765" y="257" class="txt">分类判断</text><text x="765" y="279" class="small">RUNNABLE/BLOCKED/WAIT</text>
  <rect x="905" y="230" width="180" height="64" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="995" y="257" class="txt">定位代码和资源</text><text x="995" y="279" class="small">锁/池/下游/队列</text>
  <line x1="195" y1="262" x2="255" y2="262" class="line"/><line x1="405" y1="262" x2="465" y2="262" class="line"/><line x1="625" y1="262" x2="685" y2="262" class="line"/><line x1="845" y1="262" x2="905" y2="262" class="line"/>
  <rect x="150" y="90" width="210" height="62" rx="12" fill="#ffffff" stroke="#e11d48" class="node"/><text x="255" y="117" class="txt">RUNNABLE 很多</text><text x="255" y="138" class="small">计算热点 / 死循环 / GC</text>
  <rect x="475" y="90" width="210" height="62" rx="12" fill="#ffffff" stroke="#d97706" class="node"/><text x="580" y="117" class="txt">BLOCKED 很多</text><text x="580" y="138" class="small">锁竞争 / 死锁</text>
  <rect x="800" y="90" width="210" height="62" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="905" y="117" class="txt">WAITING 很多</text><text x="905" y="138" class="small">线程池/连接池/队列</text>
  <line x1="750" y1="230" x2="255" y2="152" class="line"/><line x1="765" y1="230" x2="580" y2="152" class="line"/><line x1="780" y1="230" x2="905" y2="152" class="line"/>
  <rect x="210" y="390" width="240" height="70" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="330" y="418" class="txt">止血</text><text x="330" y="440" class="small">限流/降级/扩容/摘流量</text>
  <rect x="520" y="390" width="240" height="70" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="640" y="418" class="txt">修复</text><text x="640" y="440" class="small">参数/代码/池隔离/超时</text>
  <rect x="830" y="390" width="240" height="70" rx="12" fill="#ffffff" stroke="#7c3aed" class="node"/><text x="950" y="418" class="txt">复盘</text><text x="950" y="440" class="small">监控告警/压测/预案</text>
</svg>
