<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="540" viewBox="0 0 1180 540" role="img" aria-label="SSM 线上排查流程">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="540" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">SSM 线上问题排查：慢接口到根因</text>
  <rect x="55" y="220" width="145" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="127" y="248" class="txt">慢接口</text><text x="127" y="269" class="small">RT/P99/错误率</text>
  <rect x="260" y="220" width="150" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="335" y="248" class="txt">看入口</text><text x="335" y="269" class="small">Filter/Interceptor</text>
  <rect x="470" y="220" width="160" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="550" y="248" class="txt">看线程栈</text><text x="550" y="269" class="small">Controller/Service</text>
  <rect x="690" y="220" width="160" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="770" y="248" class="txt">看 SQL</text><text x="770" y="269" class="small">慢日志/执行计划</text>
  <rect x="910" y="220" width="200" height="66" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="1010" y="248" class="txt">看事务和连接池</text><text x="1010" y="269" class="small">锁等待/连接耗尽</text>
  <line x1="200" y1="253" x2="260" y2="253" class="line"/><line x1="410" y1="253" x2="470" y2="253" class="line"/><line x1="630" y1="253" x2="690" y2="253" class="line"/><line x1="850" y1="253" x2="910" y2="253" class="line"/>
  <rect x="160" y="380" width="220" height="64" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="270" y="407" class="txt">止血</text><text x="270" y="428" class="small">限流/降级/摘流量</text>
  <rect x="480" y="380" width="220" height="64" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="590" y="407" class="txt">修复</text><text x="590" y="428" class="small">SQL/索引/事务边界</text>
  <rect x="800" y="380" width="220" height="64" rx="12" fill="#ffffff" stroke="#d97706" class="node"/><text x="910" y="407" class="txt">复盘</text><text x="910" y="428" class="small">监控/压测/告警</text>
  <text x="590" y="105" class="small">框架问题排查不要只看代码，要把 MVC 请求、事务代理、MyBatis SQL、连接池、数据库锁串起来。</text>
</svg>
