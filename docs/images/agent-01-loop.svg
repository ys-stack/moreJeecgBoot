<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-label="Agent 工作循环">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 24px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="44" class="title">Agent：模型驱动的“观察 -> 计划 -> 行动 -> 反馈”循环</text>
  <rect x="90" y="210" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="165" y="237" class="txt">目标</text><text x="165" y="258" class="small">用户任务</text>
  <rect x="315" y="115" width="150" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="390" y="142" class="txt">观察</text><text x="390" y="163" class="small">上下文 / 环境</text>
  <rect x="555" y="115" width="150" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="630" y="142" class="txt">计划</text><text x="630" y="163" class="small">分解步骤</text>
  <rect x="795" y="210" width="150" height="66" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="870" y="237" class="txt">行动</text><text x="870" y="258" class="small">调用工具/API</text>
  <rect x="555" y="320" width="150" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="630" y="347" class="txt">反馈</text><text x="630" y="368" class="small">结果 / 错误 / 新信息</text>
  <rect x="315" y="320" width="150" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="390" y="347" class="txt">记忆</text><text x="390" y="368" class="small">短期 / 长期</text>
  <line x1="240" y1="243" x2="315" y2="148" class="line"/><line x1="465" y1="148" x2="555" y2="148" class="line"/><line x1="705" y1="148" x2="795" y2="243" class="line"/><line x1="870" y1="276" x2="705" y2="353" class="line"/><line x1="555" y1="353" x2="465" y2="353" class="line"/><line x1="390" y1="320" x2="390" y2="181" class="line"/>
  <text x="560" y="455" class="small">Agent 不是“更会聊天的模型”，而是能基于目标自主选择工具、执行步骤并根据反馈继续推进的系统。</text>
</svg>
