<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-label="CompletableFuture 异步编排">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1080" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">CompletableFuture：异步编排适合聚合查询</text>
  <rect x="70" y="210" width="150" height="65" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="145" y="248" class="txt">请求进入</text>
  <rect x="310" y="95" width="170" height="65" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="395" y="123" class="txt">查用户</text><text x="395" y="144" class="small">supplyAsync</text>
  <rect x="310" y="210" width="170" height="65" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="395" y="238" class="txt">查订单</text><text x="395" y="259" class="small">supplyAsync</text>
  <rect x="310" y="325" width="170" height="65" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="395" y="353" class="txt">查优惠</text><text x="395" y="374" class="small">supplyAsync</text>
  <rect x="610" y="210" width="180" height="65" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="700" y="238" class="txt">allOf / thenCombine</text><text x="700" y="259" class="small">聚合结果</text>
  <rect x="880" y="210" width="150" height="65" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="955" y="248" class="txt">统一返回</text>
  <line x1="220" y1="242" x2="310" y2="127" class="line"/><line x1="220" y1="242" x2="310" y2="242" class="line"/><line x1="220" y1="242" x2="310" y2="357" class="line"/>
  <line x1="480" y1="127" x2="610" y2="230" class="line"/><line x1="480" y1="242" x2="610" y2="242" class="line"/><line x1="480" y1="357" x2="610" y2="255" class="line"/>
  <line x1="790" y1="242" x2="880" y2="242" class="line"/>
  <text x="540" y="455" class="small">关键点：自定义线程池、超时控制、异常兜底、避免在业务线程池里执行阻塞过长任务。</text>
</svg>
