<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="940" height="250" viewBox="0 0 940 250" role="img" aria-label="G1 常见回收阶段">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#607086" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">G1 常见回收阶段</text>
  
  <rect x="40" y="118" width="140" height="58" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="110" y="153">Young GC</tspan></text><line x1="180" y1="147" x2="220" y2="147" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="220" y="118" width="140" height="58" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="290" y="153">并发标记</tspan></text><line x1="360" y1="147" x2="400" y2="147" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="400" y="118" width="140" height="58" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="470" y="153">最终标记 / Remark</tspan></text><line x1="540" y1="147" x2="580" y2="147" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="580" y="118" width="140" height="58" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="650" y="153">清理</tspan></text><line x1="720" y1="147" x2="760" y2="147" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>

  <rect x="760" y="118" width="140" height="58" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="830" y="153">Mixed GC</tspan></text>
</svg>
