<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-label="Redis 面试知识地图">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 24px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.txt{font:700 16px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 13px 'Microsoft YaHei',Arial,sans-serif;fill:#475569;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1180" height="560" rx="18" fill="#f8fafc"/>
  <text x="32" y="44" class="title">Redis 面试知识地图：从缓存到稳定性治理</text>
  <rect x="475" y="78" width="230" height="74" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/>
  <text x="590" y="110" class="txt">Redis 核心能力</text><text x="590" y="132" class="small">性能 / 数据结构 / 高可用 / 治理</text>
  <rect x="70" y="220" width="170" height="76" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="155" y="252" class="txt">数据结构</text><text x="155" y="274" class="small">String/Hash/ZSet/Stream</text>
  <rect x="285" y="220" width="170" height="76" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="370" y="252" class="txt">高性能模型</text><text x="370" y="274" class="small">内存 + 单线程 + IO 多路复用</text>
  <rect x="505" y="220" width="170" height="76" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="590" y="252" class="txt">持久化</text><text x="590" y="274" class="small">RDB / AOF / 混合</text>
  <rect x="725" y="220" width="170" height="76" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="810" y="252" class="txt">高可用</text><text x="810" y="274" class="small">主从 / 哨兵 / Cluster</text>
  <rect x="940" y="220" width="170" height="76" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="1025" y="252" class="txt">缓存治理</text><text x="1025" y="274" class="small">穿透/击穿/雪崩/一致性</text>
  <rect x="180" y="405" width="210" height="70" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="285" y="435" class="txt">工程高级用法</text><text x="285" y="457" class="small">Lua / Pipeline / 分布式锁</text>
  <rect x="485" y="405" width="210" height="70" rx="12" fill="#ffffff" stroke="#dc2626" class="node"/><text x="590" y="435" class="txt">线上排查</text><text x="590" y="457" class="small">慢命令 / BigKey / HotKey</text>
  <rect x="790" y="405" width="210" height="70" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="895" y="435" class="txt">面试表达</text><text x="895" y="457" class="small">边界 / 取舍 / 稳定性</text>
  <line x1="590" y1="152" x2="155" y2="220" class="line"/><line x1="590" y1="152" x2="370" y2="220" class="line"/><line x1="590" y1="152" x2="590" y2="220" class="line"/><line x1="590" y1="152" x2="810" y2="220" class="line"/><line x1="590" y1="152" x2="1025" y2="220" class="line"/>
  <line x1="370" y1="296" x2="285" y2="405" class="line"/><line x1="590" y1="296" x2="590" y2="405" class="line"/><line x1="1025" y1="296" x2="895" y2="405" class="line"/>
</svg>
