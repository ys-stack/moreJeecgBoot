<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-label="AI 应用请求链路">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <style>
      .title{font:700 24px 'Microsoft YaHei',Arial;fill:#172033}
      .txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}
      .small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}
      .label{font:700 12px 'Microsoft YaHei',Arial;fill:#475569;text-anchor:middle}
      .node{filter:url(#shadow);stroke-width:2}
      .line{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="560" rx="18" fill="#f8fafc"/>
  <text x="34" y="46" class="title">AI 应用请求链路：自然语言进入业务系统后发生了什么</text>

  <rect x="50" y="228" width="125" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/>
  <text x="112" y="254" class="txt">用户问题</text>
  <text x="112" y="275" class="small">自然语言输入</text>

  <rect x="220" y="228" width="135" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/>
  <text x="287" y="254" class="txt">Controller</text>
  <text x="287" y="275" class="small">鉴权 / 入参</text>

  <rect x="400" y="228" width="155" height="64" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/>
  <text x="477" y="254" class="txt">意图和参数</text>
  <text x="477" y="275" class="small">识别订单号等</text>

  <polygon points="640,205 730,260 640,315 550,260" fill="#fef3c7" stroke="#d97706" class="node"/>
  <text x="640" y="256" class="txt">需要业务</text>
  <text x="640" y="277" class="txt">数据？</text>

  <rect x="790" y="122" width="165" height="64" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/>
  <text x="872" y="148" class="txt">查业务系统</text>
  <text x="872" y="169" class="small">订单 / 物流 / 库存</text>

  <rect x="790" y="228" width="165" height="64" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/>
  <text x="872" y="254" class="txt">构造 Prompt</text>
  <text x="872" y="275" class="small">规则 + 上下文</text>

  <rect x="1010" y="228" width="135" height="64" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/>
  <text x="1077" y="254" class="txt">调用模型</text>
  <text x="1077" y="275" class="small">推理 / 生成</text>

  <rect x="1010" y="348" width="135" height="64" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/>
  <text x="1077" y="374" class="txt">结果处理</text>
  <text x="1077" y="395" class="small">校验 / 脱敏</text>

  <rect x="790" y="348" width="165" height="64" rx="12" fill="#f1f5f9" stroke="#64748b" class="node"/>
  <text x="872" y="374" class="txt">审计日志</text>
  <text x="872" y="395" class="small">Prompt / Token / 耗时</text>

  <rect x="575" y="348" width="130" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/>
  <text x="640" y="374" class="txt">返回用户</text>
  <text x="640" y="395" class="small">答案或兜底</text>

  <path d="M175 260 L220 260" class="line"/>
  <path d="M355 260 L400 260" class="line"/>
  <path d="M555 260 L550 260" class="line"/>
  <path d="M730 260 L790 260" class="line"/>
  <text x="760" y="246" class="label">否</text>
  <path d="M640 205 L640 154 L790 154" class="line"/>
  <text x="680" y="143" class="label">是</text>
  <path d="M872 186 L872 228" class="line"/>
  <path d="M955 260 L1010 260" class="line"/>
  <path d="M1077 292 L1077 348" class="line"/>
  <path d="M1010 380 L955 380" class="line"/>
  <path d="M790 380 L705 380" class="line"/>

  <text x="640" y="510" class="small">记住：模型不是直接面对数据库，业务系统先做鉴权、查事实、拼上下文，再让模型表达。</text>
</svg>
