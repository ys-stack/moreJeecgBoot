<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="Redis Cache Aside 一致性流程">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="430" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Redis 缓存一致性：Cache Aside 常用读写路径</text>
  <rect x="60" y="110" width="145" height="60" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="132" y="145" class="txt">读请求</text>
  <rect x="260" y="110" width="150" height="60" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="335" y="137" class="txt">先查缓存</text><text x="335" y="157" class="small">命中直接返回</text>
  <rect x="470" y="110" width="150" height="60" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="545" y="137" class="txt">缓存未命中</text><text x="545" y="157" class="small">查询数据库</text>
  <rect x="680" y="110" width="150" height="60" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="755" y="137" class="txt">回填缓存</text><text x="755" y="157" class="small">设置 TTL</text>
  <rect x="890" y="110" width="145" height="60" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="962" y="145" class="txt">返回结果</text>
  <line x1="205" y1="140" x2="260" y2="140" class="line"/><line x1="410" y1="140" x2="470" y2="140" class="line"/><line x1="620" y1="140" x2="680" y2="140" class="line"/><line x1="830" y1="140" x2="890" y2="140" class="line"/>
  <rect x="170" y="270" width="160" height="62" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="250" y="296" class="txt">写请求</text><text x="250" y="316" class="small">先更新 DB</text>
  <rect x="455" y="270" width="190" height="62" rx="12" fill="#fff7ed" stroke="#ea580c" class="node"/><text x="550" y="296" class="txt">删除缓存</text><text x="550" y="316" class="small">避免旧值长期存在</text>
  <rect x="770" y="270" width="210" height="62" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="875" y="296" class="txt">最终一致</text><text x="875" y="316" class="small">必要时消息补偿 / 延迟双删</text>
  <line x1="330" y1="301" x2="455" y2="301" class="line"/><line x1="645" y1="301" x2="770" y2="301" class="line"/>
  <text x="560" y="390" class="small">高频追问：这套方案不是强一致，关键是明确业务能否接受短暂脏读，以及是否需要补偿和监控。</text>
</svg>
