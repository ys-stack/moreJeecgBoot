<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="560" viewBox="0 0 1260 560" role="img" aria-label="Agent 执行链路">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 24px 'Microsoft YaHei',Arial;fill:#172033}
      .txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}
      .small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}
      .note{font:600 13px 'Microsoft YaHei',Arial;fill:#475569}
      .node{filter:url(#shadow);stroke-width:2}
      .line{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1260" height="560" rx="18" fill="#f8fafc"/>
  <text x="34" y="46" class="title">Agent 执行链路：每一步都要“决策、校验、执行、记录”</text>

  <rect x="60" y="230" width="130" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/>
  <text x="125" y="257" class="txt">用户目标</text>
  <text x="125" y="278" class="small">查订单并建工单</text>

  <rect x="245" y="230" width="140" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/>
  <text x="315" y="257" class="txt">AgentContext</text>
  <text x="315" y="278" class="small">任务和历史步骤</text>

  <rect x="440" y="115" width="150" height="66" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/>
  <text x="515" y="142" class="txt">模型决策</text>
  <text x="515" y="163" class="small">CALL_TOOL / FINAL</text>

  <rect x="440" y="230" width="150" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/>
  <text x="515" y="257" class="txt">解析 JSON</text>
  <text x="515" y="278" class="small">校验 action</text>

  <rect x="645" y="230" width="150" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/>
  <text x="720" y="257" class="txt">安全校验</text>
  <text x="720" y="278" class="small">白名单 / 权限</text>

  <rect x="850" y="230" width="150" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/>
  <text x="925" y="257" class="txt">执行工具</text>
  <text x="925" y="278" class="small">订单 / 物流 / 工单</text>

  <rect x="1055" y="230" width="140" height="66" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/>
  <text x="1125" y="257" class="txt">记录结果</text>
  <text x="1125" y="278" class="small">审计和反馈</text>

  <rect x="645" y="365" width="150" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/>
  <text x="720" y="392" class="txt">最终回答</text>
  <text x="720" y="413" class="small">或停止原因</text>

  <path d="M190 263 L245 263" class="line"/>
  <path d="M385 263 L440 263" class="line"/>
  <path d="M515 230 L515 181" class="line"/>
  <path d="M590 263 L645 263" class="line"/>
  <path d="M795 263 L850 263" class="line"/>
  <path d="M1000 263 L1055 263" class="line"/>
  <path d="M1125 296 C1125 500,315 500,315 296" class="line"/>
  <path d="M590 148 C720 148,720 365,720 365" class="line"/>

  <text x="75" y="512" class="note">关键点：模型只决定下一步，Java 服务必须解析、校验、执行并记录。工具结果再回到上下文，进入下一轮决策。</text>
</svg>
