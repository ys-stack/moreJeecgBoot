<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="520" viewBox="0 0 1160 520" role="img" aria-label="Spring 声明式事务执行流程">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1160" height="520" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring 声明式事务：代理拦截到提交/回滚</text>
  <rect x="60" y="210" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="135" y="248" class="txt">外部调用</text>
  <rect x="270" y="210" width="160" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="350" y="238" class="txt">事务代理</text><text x="350" y="259" class="small">TransactionInterceptor</text>
  <rect x="490" y="210" width="165" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="572" y="238" class="txt">获取连接</text><text x="572" y="259" class="small">绑定 ThreadLocal</text>
  <rect x="715" y="210" width="160" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="795" y="238" class="txt">执行业务 SQL</text><text x="795" y="259" class="small">同线程同连接</text>
  <rect x="935" y="210" width="160" height="66" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="1015" y="238" class="txt">提交/回滚</text><text x="1015" y="259" class="small">释放资源</text>
  <line x1="210" y1="243" x2="270" y2="243" class="line"/><line x1="430" y1="243" x2="490" y2="243" class="line"/><line x1="655" y1="243" x2="715" y2="243" class="line"/><line x1="875" y1="243" x2="935" y2="243" class="line"/>
  <rect x="170" y="365" width="230" height="58" rx="10" fill="#ffffff" stroke="#e11d48" class="node"/><text x="285" y="399" class="txt">自调用事务失效</text>
  <rect x="465" y="365" width="230" height="58" rx="10" fill="#ffffff" stroke="#d97706" class="node"/><text x="580" y="399" class="txt">异常类型影响回滚</text>
  <rect x="760" y="365" width="230" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="875" y="399" class="txt">传播行为决定边界</text>
  <text x="580" y="105" class="small">核心：事务不是魔法，本质是代理 + 连接绑定 + commit/rollback；同一个事务内必须使用同一个数据库连接。</text>
</svg>
