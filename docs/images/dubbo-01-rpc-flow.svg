<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" role="img" aria-label="Dubbo RPC 调用链路">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="470" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Dubbo RPC：注册发现、动态代理、集群容错与网络调用</text>
  <rect x="60" y="205" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="135" y="232" class="txt">Consumer</text><text x="135" y="253" class="small">接口代理</text>
  <rect x="285" y="205" width="155" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="362" y="232" class="txt">Cluster</text><text x="362" y="253" class="small">路由 / 负载 / 容错</text>
  <rect x="515" y="90" width="165" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="597" y="117" class="txt">Registry</text><text x="597" y="138" class="small">服务注册发现</text>
  <rect x="515" y="205" width="165" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="597" y="232" class="txt">Protocol / Transport</text><text x="597" y="253" class="small">序列化 / Netty</text>
  <rect x="755" y="205" width="150" height="66" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="830" y="232" class="txt">Provider</text><text x="830" y="253" class="small">服务实现</text>
  <rect x="950" y="205" width="120" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="1010" y="232" class="txt">业务方法</text><text x="1010" y="253" class="small">执行返回</text>
  <line x1="210" y1="238" x2="285" y2="238" class="line"/><line x1="440" y1="238" x2="515" y2="238" class="line"/><line x1="680" y1="238" x2="755" y2="238" class="line"/><line x1="905" y1="238" x2="950" y2="238" class="line"/>
  <line x1="135" y1="205" x2="515" y2="123" class="line"/><line x1="830" y1="205" x2="680" y2="123" class="line"/>
  <text x="560" y="390" class="small">高频追问：Dubbo 不是只会调接口，核心在代理、注册发现、负载均衡、容错策略、序列化和线程模型。</text>
</svg>
