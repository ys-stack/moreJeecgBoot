<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Spring 三级缓存解决循环依赖">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1100" height="520" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring 三级缓存解决 setter 循环依赖</text>
  <rect x="80" y="105" width="190" height="72" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="175" y="135" class="txt">singletonObjects</text><text x="175" y="158" class="small">一级：完整单例</text>
  <rect x="455" y="105" width="190" height="72" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="550" y="135" class="txt">earlySingletonObjects</text><text x="550" y="158" class="small">二级：早期引用</text>
  <rect x="830" y="105" width="190" height="72" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="925" y="135" class="txt">singletonFactories</text><text x="925" y="158" class="small">三级：ObjectFactory</text>
  <line x1="830" y1="141" x2="645" y2="141" class="line"/><line x1="455" y1="141" x2="270" y2="141" class="line"/>
  <rect x="175" y="310" width="190" height="72" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="270" y="340" class="txt">创建 A</text><text x="270" y="363" class="small">实例化后提前暴露</text>
  <rect x="455" y="310" width="190" height="72" rx="12" fill="#ffffff" stroke="#7c3aed" class="node"/><text x="550" y="340" class="txt">填充 A 依赖 B</text><text x="550" y="363" class="small">触发创建 B</text>
  <rect x="735" y="310" width="190" height="72" rx="12" fill="#ffffff" stroke="#e11d48" class="node"/><text x="830" y="340" class="txt">B 依赖 A</text><text x="830" y="363" class="small">取 A 早期引用</text>
  <line x1="365" y1="346" x2="455" y2="346" class="line"/><line x1="645" y1="346" x2="735" y2="346" class="line"/>
  <text x="550" y="455" class="small">只解决单例 setter/字段注入循环依赖；构造器循环依赖无法解决。三级缓存存在的关键原因是提前暴露时可能需要拿到代理对象。</text>
</svg>
