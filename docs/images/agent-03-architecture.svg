<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-label="Agent 组成架构">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font:700 24px 'Microsoft YaHei',Arial;fill:#172033}
      .txt{font:700 16px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}
      .small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}
      .note{font:600 13px 'Microsoft YaHei',Arial;fill:#475569}
      .node{filter:url(#shadow);stroke-width:2}
      .line{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1180" height="620" rx="18" fill="#f8fafc"/>
  <text x="34" y="46" class="title">Agent 组成架构：LLM 是大脑，工程系统是骨架和刹车</text>

  <rect x="455" y="230" width="270" height="105" rx="18" fill="#fee2e2" stroke="#dc2626" class="node"/>
  <text x="590" y="267" class="txt">LLM 决策核心</text>
  <text x="590" y="292" class="small">理解目标 / 选择工具 / 生成回答</text>
  <text x="590" y="313" class="small">不能直接绕过工程边界</text>

  <rect x="80" y="115" width="190" height="75" rx="14" fill="#dbeafe" stroke="#2563eb" class="node"/>
  <text x="175" y="145" class="txt">Tools</text>
  <text x="175" y="168" class="small">业务接口 / 数据库 / 搜索</text>

  <rect x="80" y="265" width="190" height="75" rx="14" fill="#dcfce7" stroke="#16a34a" class="node"/>
  <text x="175" y="295" class="txt">Memory</text>
  <text x="175" y="318" class="small">短期上下文 / 长期记忆</text>

  <rect x="80" y="415" width="190" height="75" rx="14" fill="#fef3c7" stroke="#d97706" class="node"/>
  <text x="175" y="445" class="txt">Planner</text>
  <text x="175" y="468" class="small">拆任务 / 选步骤</text>

  <rect x="910" y="115" width="190" height="75" rx="14" fill="#ede9fe" stroke="#7c3aed" class="node"/>
  <text x="1005" y="145" class="txt">Executor</text>
  <text x="1005" y="168" class="small">执行工具 / 处理结果</text>

  <rect x="910" y="265" width="190" height="75" rx="14" fill="#e0f2fe" stroke="#0284c7" class="node"/>
  <text x="1005" y="295" class="txt">Guardrail</text>
  <text x="1005" y="318" class="small">权限 / 审批 / 停止条件</text>

  <rect x="910" y="415" width="190" height="75" rx="14" fill="#ffffff" stroke="#64748b" class="node"/>
  <text x="1005" y="445" class="txt">Observability</text>
  <text x="1005" y="468" class="small">日志 / 审计 / 回放</text>

  <path d="M270 152 L455 255" class="line"/>
  <path d="M270 302 L455 282" class="line"/>
  <path d="M270 452 L455 310" class="line"/>
  <path d="M725 255 L910 152" class="line"/>
  <path d="M725 282 L910 302" class="line"/>
  <path d="M725 310 L910 452" class="line"/>

  <rect x="210" y="545" width="760" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="590" y="575" class="note" text-anchor="middle">生产级 Agent 的难点不是“让模型想”，而是“让它只能在安全、可追踪、可停止的范围内想和做”。</text>
</svg>
