<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="480" viewBox="0 0 1040 480" role="img" aria-label="Spring MVC 异常处理链">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1040" height="480" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring MVC 异常处理链路</text>
  <rect x="80" y="190" width="160" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="160" y="218" class="txt">Controller 抛异常</text><text x="160" y="239" class="small">业务/参数/系统</text>
  <rect x="320" y="190" width="190" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="415" y="218" class="txt">HandlerExceptionResolver</text><text x="415" y="239" class="small">选择处理器</text>
  <rect x="590" y="190" width="170" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="675" y="218" class="txt">@ControllerAdvice</text><text x="675" y="239" class="small">@ExceptionHandler</text>
  <rect x="840" y="190" width="140" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="910" y="218" class="txt">统一响应</text><text x="910" y="239" class="small">code/message/data</text>
  <line x1="240" y1="223" x2="320" y2="223" class="line"/><line x1="510" y1="223" x2="590" y2="223" class="line"/><line x1="760" y1="223" x2="840" y2="223" class="line"/>
  <rect x="210" y="340" width="220" height="58" rx="10" fill="#ffffff" stroke="#e11d48" class="node"/><text x="320" y="374" class="txt">参数校验异常</text>
  <rect x="500" y="340" width="220" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="610" y="374" class="txt">业务异常可预期</text>
  <rect x="790" y="340" width="170" height="58" rx="10" fill="#ffffff" stroke="#d97706" class="node"/><text x="875" y="374" class="txt">系统异常告警</text>
</svg>
