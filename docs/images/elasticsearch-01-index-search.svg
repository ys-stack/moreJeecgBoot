<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500" role="img" aria-label="Elasticsearch 写入与搜索链路">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Elasticsearch：写入近实时，搜索分片并行</text>
  <rect x="55" y="115" width="135" height="58" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="122" y="149" class="txt">文档写入</text>
  <rect x="245" y="115" width="150" height="58" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="320" y="149" class="txt">路由到主分片</text>
  <rect x="450" y="115" width="150" height="58" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="525" y="140" class="txt">内存 Buffer</text><text x="525" y="160" class="small">Translog 兜底</text>
  <rect x="655" y="115" width="150" height="58" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="730" y="140" class="txt">Refresh</text><text x="730" y="160" class="small">生成 Segment</text>
  <rect x="860" y="115" width="150" height="58" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="935" y="149" class="txt">近实时可搜</text>
  <line x1="190" y1="144" x2="245" y2="144" class="line"/><line x1="395" y1="144" x2="450" y2="144" class="line"/><line x1="600" y1="144" x2="655" y2="144" class="line"/><line x1="805" y1="144" x2="860" y2="144" class="line"/>
  <rect x="55" y="305" width="135" height="58" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="122" y="339" class="txt">搜索请求</text>
  <rect x="245" y="305" width="150" height="58" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="320" y="330" class="txt">协调节点</text><text x="320" y="350" class="small">拆分请求</text>
  <rect x="450" y="305" width="150" height="58" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="525" y="330" class="txt">各分片查询</text><text x="525" y="350" class="small">倒排索引</text>
  <rect x="655" y="305" width="150" height="58" rx="12" fill="#ffffff" stroke="#d97706" class="node"/><text x="730" y="330" class="txt">相关性排序</text><text x="730" y="350" class="small">打分 / 聚合</text>
  <rect x="860" y="305" width="150" height="58" rx="12" fill="#ffffff" stroke="#dc2626" class="node"/><text x="935" y="339" class="txt">合并返回</text>
  <line x1="190" y1="334" x2="245" y2="334" class="line"/><line x1="395" y1="334" x2="450" y2="334" class="line"/><line x1="600" y1="334" x2="655" y2="334" class="line"/><line x1="805" y1="334" x2="860" y2="334" class="line"/>
</svg>
