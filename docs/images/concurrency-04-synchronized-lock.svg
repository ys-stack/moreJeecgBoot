<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-label="synchronized 锁升级与 monitor">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 16px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 13px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1040" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">synchronized：对象头、Monitor 与锁升级</text>
  <rect x="80" y="105" width="180" height="70" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="170" y="134" class="txt">无锁</text><text x="170" y="156" class="small">对象头 Mark Word</text>
  <rect x="315" y="105" width="180" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="405" y="134" class="txt">偏向锁</text><text x="405" y="156" class="small">偏向第一个线程</text>
  <rect x="550" y="105" width="180" height="70" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="640" y="134" class="txt">轻量级锁</text><text x="640" y="156" class="small">CAS + Lock Record</text>
  <rect x="785" y="105" width="180" height="70" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="875" y="134" class="txt">重量级锁</text><text x="875" y="156" class="small">Monitor 阻塞唤醒</text>
  <line x1="260" y1="140" x2="315" y2="140" class="line"/><line x1="495" y1="140" x2="550" y2="140" class="line"/><line x1="730" y1="140" x2="785" y2="140" class="line"/>
  <rect x="180" y="285" width="250" height="105" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="305" y="318" class="txt">EntryList</text><text x="305" y="343" class="small">竞争锁失败的线程</text><text x="305" y="366" class="small">BLOCKED</text>
  <rect x="610" y="285" width="250" height="105" rx="12" fill="#ffffff" stroke="#7c3aed" class="node"/><text x="735" y="318" class="txt">WaitSet</text><text x="735" y="343" class="small">调用 wait 后等待</text><text x="735" y="366" class="small">WAITING</text>
  <rect x="455" y="305" width="130" height="65" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="520" y="344" class="txt">Monitor</text>
  <line x1="430" y1="337" x2="455" y2="337" class="line"/><line x1="585" y1="337" x2="610" y2="337" class="line"/>
  <text x="520" y="445" class="small">wait 会释放锁进入 WaitSet；sleep 不释放锁；notify/notifyAll 只负责唤醒，重新执行还要再次竞争锁</text>
</svg>
