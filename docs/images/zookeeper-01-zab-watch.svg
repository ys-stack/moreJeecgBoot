<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="480" viewBox="0 0 1120 480" role="img" aria-label="ZooKeeper ZAB 与 Watch 机制">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="480" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">ZooKeeper：ZAB 保证写入顺序，Watch 提供一次性事件通知</text>
  <rect x="70" y="130" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="145" y="157" class="txt">Client</text><text x="145" y="178" class="small">读写 / Watch</text>
  <rect x="315" y="80" width="150" height="66" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="390" y="107" class="txt">Leader</text><text x="390" y="128" class="small">处理写请求</text>
  <rect x="570" y="70" width="150" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="645" y="97" class="txt">Follower A</text><text x="645" y="118" class="small">投票确认</text>
  <rect x="570" y="175" width="150" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="645" y="202" class="txt">Follower B</text><text x="645" y="223" class="small">投票确认</text>
  <rect x="820" y="122" width="170" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="905" y="149" class="txt">过半 ACK</text><text x="905" y="170" class="small">提交事务</text>
  <line x1="220" y1="163" x2="315" y2="113" class="line"/><line x1="465" y1="113" x2="570" y2="103" class="line"/><line x1="465" y1="113" x2="570" y2="208" class="line"/><line x1="720" y1="103" x2="820" y2="155" class="line"/><line x1="720" y1="208" x2="820" y2="155" class="line"/>
  <rect x="165" y="330" width="190" height="62" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="260" y="356" class="txt">注册 Watch</text><text x="260" y="376" class="small">监听节点变化</text>
  <rect x="465" y="330" width="190" height="62" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="560" y="356" class="txt">节点变化</text><text x="560" y="376" class="small">create/delete/data</text>
  <rect x="765" y="330" width="190" height="62" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="860" y="356" class="txt">一次性通知</text><text x="860" y="376" class="small">收到后需重新注册</text>
  <line x1="355" y1="361" x2="465" y2="361" class="line"/><line x1="655" y1="361" x2="765" y2="361" class="line"/>
</svg>
