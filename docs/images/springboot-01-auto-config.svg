<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="Spring Boot 自动配置流程">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="430" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring Boot 自动配置：Starter 不是魔法，条件装配才是核心</text>
  <rect x="50" y="145" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="125" y="173" class="txt">引入 starter</text><text x="125" y="194" class="small">依赖进入 classpath</text>
  <rect x="250" y="145" width="165" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="332" y="173" class="txt">@EnableAutoConfiguration</text><text x="332" y="194" class="small">导入候选配置类</text>
  <rect x="465" y="145" width="160" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="545" y="173" class="txt">条件判断</text><text x="545" y="194" class="small">Class / Bean / Property</text>
  <rect x="675" y="145" width="160" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="755" y="173" class="txt">注册默认 Bean</text><text x="755" y="194" class="small">@ConditionalOnMissingBean</text>
  <rect x="885" y="145" width="170" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="970" y="173" class="txt">用户可覆盖</text><text x="970" y="194" class="small">自定义 Bean 优先</text>
  <line x1="200" y1="178" x2="250" y2="178" class="line"/><line x1="415" y1="178" x2="465" y2="178" class="line"/><line x1="625" y1="178" x2="675" y2="178" class="line"/><line x1="835" y1="178" x2="885" y2="178" class="line"/>
  <rect x="180" y="295" width="210" height="58" rx="10" fill="#ffffff" stroke="#2563eb" class="node"/><text x="285" y="329" class="txt">默认可用</text>
  <rect x="455" y="295" width="210" height="58" rx="10" fill="#ffffff" stroke="#d97706" class="node"/><text x="560" y="329" class="txt">按需生效</text>
  <rect x="730" y="295" width="210" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="835" y="329" class="txt">允许接管</text>
</svg>
