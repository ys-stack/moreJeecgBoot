<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500" role="img" aria-label="Spring MVC 请求流程">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 14px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring MVC 请求处理主链路</text>
  <rect x="35" y="210" width="120" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="95" y="247" class="txt">Client</text>
  <rect x="200" y="210" width="145" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="272" y="238" class="txt">Filter Chain</text><text x="272" y="259" class="small">Servlet Filter</text>
  <rect x="390" y="210" width="160" height="64" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="470" y="238" class="txt">DispatcherServlet</text><text x="470" y="259" class="small">前端控制器</text>
  <rect x="595" y="210" width="160" height="64" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="675" y="238" class="txt">HandlerMapping</text><text x="675" y="259" class="small">找 Controller</text>
  <rect x="800" y="210" width="160" height="64" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="880" y="238" class="txt">HandlerAdapter</text><text x="880" y="259" class="small">参数/返回值</text>
  <rect x="1005" y="210" width="130" height="64" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="1070" y="247" class="txt">Controller</text>
  <line x1="155" y1="242" x2="200" y2="242" class="line"/><line x1="345" y1="242" x2="390" y2="242" class="line"/><line x1="550" y1="242" x2="595" y2="242" class="line"/><line x1="755" y1="242" x2="800" y2="242" class="line"/><line x1="960" y1="242" x2="1005" y2="242" class="line"/>
  <rect x="220" y="365" width="210" height="58" rx="10" fill="#ffffff" stroke="#2563eb" class="node"/><text x="325" y="399" class="txt">Interceptor</text>
  <rect x="485" y="365" width="210" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="590" y="399" class="txt">HttpMessageConverter</text>
  <rect x="750" y="365" width="210" height="58" rx="10" fill="#ffffff" stroke="#d97706" class="node"/><text x="855" y="399" class="txt">ExceptionResolver</text>
  <text x="590" y="100" class="small">抓主线：DispatcherServlet 调度，HandlerMapping 找方法，HandlerAdapter 负责调用细节，Converter 做 JSON 转换。</text>
</svg>
