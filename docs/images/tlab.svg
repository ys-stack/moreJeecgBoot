  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">TLAB：线程本地分配缓冲区</text>
  
  <rect x="80" y="100" width="700" height="190" rx="12" fill="#eef6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="430" y="201">Eden 区</tspan></text>

  <rect x="125" y="135" width="160" height="52" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
