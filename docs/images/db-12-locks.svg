<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">InnoDB 锁体系</title>
  <desc id="desc">表锁、意向锁、记录锁、间隙锁、临键锁、插入意向锁之间的关系</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 32px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.box{fill:white;stroke:#cbd5e1;stroke-width:2;rx:14}
      .table{fill:#eaf2ff;stroke:#7db0ff}.row{fill:#ecfdf3;stroke:#7bc992}.gap{fill:#fff6df;stroke:#efc05e}.danger{fill:#fff0f0;stroke:#ef9292}
      .head{font:700 21px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.txt{font:400 16px Arial,"Microsoft YaHei",sans-serif;fill:#344054}.small{font:400 14px Arial,"Microsoft YaHei",sans-serif;fill:#667085}
      .line{stroke:#64748b;stroke-width:2.5;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="48" y="58">InnoDB 锁：锁住的是索引，不只是“行”</text>
  <rect class="box" x="90" y="120" width="1090" height="160"/>
  <text class="head" x="130" y="165">按粒度</text>
  <rect class="table" x="250" y="190" width="210" height="58" rx="12"/><text class="txt" x="305" y="226">表级锁</text>
  <rect class="row" x="540" y="190" width="210" height="58" rx="12"/><text class="txt" x="590" y="226">行级锁</text>
  <rect class="gap" x="830" y="190" width="210" height="58" rx="12"/><text class="txt" x="870" y="226">意向锁</text>
  <rect class="box" x="90" y="330" width="1090" height="210"/>
  <text class="head" x="130" y="375">行级锁类型</text>
  <rect class="row" x="150" y="415" width="220" height="72" rx="12"/><text class="txt" x="200" y="446">Record Lock</text><text class="small" x="188" y="471">锁定索引记录</text>
  <rect class="gap" x="405" y="415" width="220" height="72" rx="12"/><text class="txt" x="470" y="446">Gap Lock</text><text class="small" x="460" y="471">锁定记录间隙</text>
  <rect class="danger" x="660" y="415" width="220" height="72" rx="12"/><text class="txt" x="720" y="446">Next-Key</text><text class="small" x="700" y="471">记录锁 + 间隙锁</text>
  <rect class="table" x="915" y="415" width="220" height="72" rx="12"/><text class="txt" x="965" y="446">Insert Intention</text><text class="small" x="960" y="471">插入意向锁</text>
  <rect class="box" x="150" y="600" width="980" height="80"/>
  <text class="txt" x="190" y="636">高频追问：唯一索引等值命中通常退化为记录锁；范围查询、未命中、非唯一索引更容易出现间隙锁</text>
  <text class="small" x="190" y="664">没有合适索引时，扫描范围变大，锁范围也会扩大，可能造成“看似锁一行，实际阻塞一片”</text>
  <path class="line" d="M260 248 L260 415"/><path class="line" d="M645 248 L645 415"/><path class="line" d="M935 248 L935 415"/>
</svg>
