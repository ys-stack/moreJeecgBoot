<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="650" viewBox="0 0 1040 650" role="img" aria-label="内存泄漏排查流程">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#607086" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">内存泄漏排查流程</text>
  
  <rect x="410" y="70" width="220" height="56" rx="12" fill="#ffe4e6" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="520" y="104">怀疑内存泄漏</tspan></text>

  <rect x="400" y="150" width="240" height="56" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="520" y="184">jstat 观察堆变化</tspan></text>

  <polygon points="520,235 675,282.5 520,330 365,282.5" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#172033" text-anchor="middle"><tspan x="520" y="288.5">Old 区是否持续上涨</tspan></text>

  <rect x="70" y="370" width="240" height="58" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="190" y="395">否</tspan><tspan x="190" y="415">可能是瞬时流量或正常波动</tspan></text>

  <rect x="400" y="370" width="240" height="58" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="520" y="395">是</tspan><tspan x="520" y="415">观察 Full GC 后 Old 是否下降</tspan></text>

  <polygon points="520,455 675,502.5 520,550 365,502.5" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#172033" text-anchor="middle"><tspan x="520" y="508.5">下降是否明显</tspan></text>

  <rect x="70" y="570" width="260" height="56" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="200" y="594">明显</tspan><tspan x="200" y="614">对象创建过快或堆偏小</tspan></text>

  <rect x="410" y="570" width="210" height="56" rx="12" fill="#ffe4e6" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="515" y="594">不明显</tspan><tspan x="515" y="614">Dump 堆</tspan></text>

  <rect x="720" y="360" width="250" height="56" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="845" y="394">MAT / JProfiler 分析</tspan></text>

  <rect x="720" y="445" width="250" height="56" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="845" y="479">看 Dominator Tree</tspan></text>

  <rect x="720" y="530" width="250" height="56" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="845" y="564">看 GC Roots 引用链</tspan></text>
<line x1="520" y1="126" x2="520" y2="150" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="520" y1="206" x2="520" y2="235" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="365" y1="282" x2="190" y2="370" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="277.5" y="318" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">否</text>
<line x1="520" y1="330" x2="520" y2="370" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="520" y="342" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">是</text>
<line x1="520" y1="428" x2="520" y2="455" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="365" y1="502" x2="200" y2="570" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="282.5" y="528" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">是</text>
<line x1="520" y1="550" x2="520" y2="570" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="520" y="552" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">否</text>
<line x1="620" y1="598" x2="720" y2="388" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="845" y1="416" x2="845" y2="445" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="845" y1="501" x2="845" y2="530" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
</svg>
