<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500" role="img" aria-label="MyBatis SQL 执行链路">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 14px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">MyBatis SQL 执行链路</text>
  <rect x="45" y="210" width="130" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="110" y="247" class="txt">Mapper 接口</text>
  <rect x="225" y="210" width="145" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="297" y="238" class="txt">MapperProxy</text><text x="297" y="259" class="small">动态代理</text>
  <rect x="420" y="210" width="145" height="64" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="492" y="238" class="txt">SqlSession</text><text x="492" y="259" class="small">会话入口</text>
  <rect x="615" y="210" width="145" height="64" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="687" y="238" class="txt">Executor</text><text x="687" y="259" class="small">缓存/调度</text>
  <rect x="810" y="210" width="160" height="64" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="890" y="238" class="txt">StatementHandler</text><text x="890" y="259" class="small">JDBC Statement</text>
  <rect x="1020" y="210" width="120" height="64" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="1080" y="247" class="txt">Database</text>
  <line x1="175" y1="242" x2="225" y2="242" class="line"/><line x1="370" y1="242" x2="420" y2="242" class="line"/><line x1="565" y1="242" x2="615" y2="242" class="line"/><line x1="760" y1="242" x2="810" y2="242" class="line"/><line x1="970" y1="242" x2="1020" y2="242" class="line"/>
  <rect x="250" y="360" width="190" height="58" rx="10" fill="#ffffff" stroke="#2563eb" class="node"/><text x="345" y="394" class="txt">ParameterHandler</text>
  <rect x="495" y="360" width="190" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="590" y="394" class="txt">ResultSetHandler</text>
  <rect x="740" y="360" width="190" height="58" rx="10" fill="#ffffff" stroke="#d97706" class="node"/><text x="835" y="394" class="txt">TypeHandler</text>
  <text x="590" y="100" class="small">抓主线：Mapper 是代理，MappedStatement 存 SQL 元数据，Executor 负责执行和缓存，Handler 负责参数、语句、结果映射。</text>
</svg>
