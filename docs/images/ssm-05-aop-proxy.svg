<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-label="Spring AOP 代理调用链">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring AOP：代理对象与拦截器链</text>
  <rect x="75" y="210" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="150" y="248" class="txt">调用方</text>
  <rect x="305" y="210" width="170" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="390" y="238" class="txt">代理对象</text><text x="390" y="259" class="small">JDK / CGLIB</text>
  <rect x="555" y="210" width="190" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="650" y="238" class="txt">MethodInterceptor 链</text><text x="650" y="259" class="small">事务/日志/权限</text>
  <rect x="825" y="210" width="170" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="910" y="238" class="txt">目标对象</text><text x="910" y="259" class="small">真实业务方法</text>
  <line x1="225" y1="243" x2="305" y2="243" class="line"/><line x1="475" y1="243" x2="555" y2="243" class="line"/><line x1="745" y1="243" x2="825" y2="243" class="line"/>
  <rect x="270" y="360" width="210" height="58" rx="10" fill="#ffffff" stroke="#e11d48" class="node"/><text x="375" y="394" class="txt">自调用绕过代理</text>
  <rect x="620" y="360" width="230" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="735" y="394" class="txt">外部通过代理调用才增强</text>
  <text x="560" y="95" class="small">JDK 动态代理基于接口；CGLIB 基于子类。Spring Boot 默认通常可使用 CGLIB，但 final 类/方法不能被子类代理增强。</text>
</svg>
