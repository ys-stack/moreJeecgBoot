<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540" viewBox="0 0 1100 540" role="img" aria-label="JMM 与 happens-before">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 16px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 13px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}.dbl{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1100" height="540" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">JMM：可见性、有序性与 happens-before</text>
  <rect x="410" y="80" width="280" height="80" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="550" y="112" class="txt">主内存</text><text x="550" y="136" class="small">共享变量最终存放位置</text>
  <rect x="100" y="250" width="250" height="95" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="225" y="284" class="txt">线程 A 工作内存</text><text x="225" y="310" class="small">读变量副本 / 写回主内存</text>
  <rect x="750" y="250" width="250" height="95" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="875" y="284" class="txt">线程 B 工作内存</text><text x="875" y="310" class="small">看到的是同步后的结果</text>
  <line x1="470" y1="160" x2="300" y2="250" class="line"/><line x1="275" y1="250" x2="450" y2="160" class="line"/>
  <line x1="630" y1="160" x2="800" y2="250" class="line"/><line x1="825" y1="250" x2="650" y2="160" class="line"/>
  <rect x="115" y="410" width="190" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="210" y="444" class="txt">volatile 写</text>
  <rect x="455" y="410" width="190" height="58" rx="10" fill="#ffffff" stroke="#d97706" class="node"/><text x="550" y="444" class="txt">happens-before</text>
  <rect x="795" y="410" width="190" height="58" rx="10" fill="#ffffff" stroke="#7c3aed" class="node"/><text x="890" y="444" class="txt">volatile 读</text>
  <line x1="305" y1="439" x2="455" y2="439" class="line"/><line x1="645" y1="439" x2="795" y2="439" class="line"/>
  <text x="550" y="505" class="small">锁释放 -> 后续加锁、volatile 写 -> 后续读、start/join、程序顺序、传递性，都能建立可见性和有序性约束</text>
</svg>
