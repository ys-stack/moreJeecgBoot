<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="500" viewBox="0 0 1060 500" role="img" aria-label="MyBatis 一级缓存和二级缓存">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1060" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">MyBatis 缓存：一级默认开启，二级慎用</text>
  <rect x="90" y="120" width="190" height="78" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="185" y="150" class="txt">SqlSession A</text><text x="185" y="174" class="small">一级缓存，本会话内</text>
  <rect x="90" y="300" width="190" height="78" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="185" y="330" class="txt">SqlSession B</text><text x="185" y="354" class="small">一级缓存，本会话内</text>
  <rect x="440" y="210" width="210" height="78" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="545" y="240" class="txt">Mapper 二级缓存</text><text x="545" y="264" class="small">namespace 级别</text>
  <rect x="800" y="210" width="170" height="78" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="885" y="240" class="txt">Database</text><text x="885" y="264" class="small">真实数据源</text>
  <line x1="280" y1="159" x2="440" y2="230" class="line"/><line x1="280" y1="339" x2="440" y2="268" class="line"/><line x1="650" y1="249" x2="800" y2="249" class="line"/>
  <text x="530" y="430" class="small">一级缓存事务内可能读到旧数据；二级缓存跨 SqlSession，复杂业务和多表更新下容易一致性失控，生产更常用 Redis/Caffeine 管理缓存。</text>
</svg>
