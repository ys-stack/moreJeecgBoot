<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">MVCC 与 Read View</title>
  <desc id="desc">版本链、trx_id、roll_pointer、Undo Log 和 Read View 可见性判断</desc>
  <defs>
    <style>
      .bg{fill:#fbfcfe}.title{font:700 32px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.box{fill:white;stroke:#cbd5e1;stroke-width:2;rx:12}
      .version{fill:#eaf2ff;stroke:#7db0ff}.undo{fill:#fff6df;stroke:#efc05e}.view{fill:#ecfdf3;stroke:#7bc992}.rule{fill:#f5ecff;stroke:#c39bff}
      .head{font:700 21px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.txt{font:400 16px Arial,"Microsoft YaHei",sans-serif;fill:#344054}.small{font:400 14px Arial,"Microsoft YaHei",sans-serif;fill:#667085}.mono{font:400 15px Consolas,monospace;fill:#334155}
      .arrow{stroke:#52677f;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#52677f"/></marker>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="48" y="58">MVCC：快照读为什么不加锁也能一致</text>
  <rect class="version" x="90" y="135" width="260" height="120" rx="14"/>
  <text class="head" x="125" y="178">当前记录版本</text>
  <text class="mono" x="125" y="210">trx_id = 120</text>
  <text class="mono" x="125" y="235">roll_ptr -> v2</text>
  <path class="arrow" d="M350 195 L450 195"/>
  <rect class="undo" x="450" y="135" width="230" height="120" rx="14"/>
  <text class="head" x="490" y="178">历史版本 v2</text>
  <text class="mono" x="490" y="210">trx_id = 105</text>
  <text class="mono" x="490" y="235">roll_ptr -> v1</text>
  <path class="arrow" d="M680 195 L780 195"/>
  <rect class="undo" x="780" y="135" width="230" height="120" rx="14"/>
  <text class="head" x="820" y="178">历史版本 v1</text>
  <text class="mono" x="820" y="210">trx_id = 80</text>
  <text class="mono" x="820" y="235">roll_ptr = null</text>
  <rect class="view" x="120" y="350" width="460" height="190" rx="16"/>
  <text class="head" x="155" y="392">Read View</text>
  <text class="txt" x="155" y="430">m_ids：创建快照时活跃事务 ID 集合</text>
  <text class="txt" x="155" y="462">min_trx_id：活跃事务最小 ID</text>
  <text class="txt" x="155" y="494">max_trx_id：下一个将分配的事务 ID</text>
  <rect class="rule" x="675" y="335" width="455" height="230" rx="16"/>
  <text class="head" x="710" y="378">可见性判断</text>
  <text class="txt" x="710" y="415">版本 trx_id 小于 min_trx_id：可见</text>
  <text class="txt" x="710" y="447">版本 trx_id 大于等于 max_trx_id：不可见</text>
  <text class="txt" x="710" y="479">版本 trx_id 在 m_ids 中：不可见</text>
  <text class="txt" x="710" y="511">否则：可见</text>
  <rect class="box" x="130" y="635" width="1020" height="64"/>
  <text class="txt" x="165" y="672">RC 每次快照读生成新的 Read View；RR 第一次快照读生成后复用，因此同一事务内可重复读</text>
</svg>
