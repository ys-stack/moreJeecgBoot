<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-label="Full GC 日志判断思路">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#607086" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">Full GC 日志判断思路</text>
  
  <rect x="330" y="75" width="220" height="58" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="440" y="110">发现 Full GC 频繁</tspan></text>

  <polygon points="440,175 580,230 440,285 300,230" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="700" fill="#172033" text-anchor="middle"><tspan x="440" y="226">Full GC 后</tspan><tspan x="440" y="246">Old 区是否明显下降</tspan></text>

  <rect x="70" y="345" width="270" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="205" y="373">明显下降</tspan><tspan x="205" y="393">瞬时大对象 / 参数不合理 / 晋升过快</tspan></text>

  <rect x="560" y="325" width="270" height="64" rx="12" fill="#ffe4e6" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="695" y="353">下降很少</tspan><tspan x="695" y="373">高度怀疑内存泄漏或长期引用</tspan></text>

  <rect x="580" y="400" width="230" height="48" rx="12" fill="#ffffff" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="695" y="430">Dump 堆内存，MAT 分析</tspan></text>
<line x1="440" y1="133" x2="440" y2="175" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="330" y1="250" x2="205" y2="345" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="267.5" y="289.5" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">是</text>
<line x1="550" y1="250" x2="695" y2="325" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="622.5" y="279.5" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">否</text>
<line x1="695" y1="389" x2="695" y2="400" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
</svg>
