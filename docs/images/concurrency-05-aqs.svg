<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="AQS 原理">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 16px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 13px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1100" height="520" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">AQS：state + CLH 队列 + park/unpark</text>
  <rect x="430" y="80" width="240" height="74" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="550" y="110" class="txt">AbstractQueuedSynchronizer</text><text x="550" y="134" class="small">ReentrantLock / Semaphore / CountDownLatch</text>
  <rect x="110" y="235" width="170" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="195" y="264" class="txt">state</text><text x="195" y="287" class="small">CAS 修改同步状态</text>
  <rect x="370" y="235" width="160" height="70" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="450" y="264" class="txt">独占/共享</text><text x="450" y="287" class="small">tryAcquire</text>
  <rect x="620" y="235" width="160" height="70" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="700" y="264" class="txt">等待队列</text><text x="700" y="287" class="small">CLH 双向链表</text>
  <rect x="850" y="235" width="160" height="70" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="930" y="264" class="txt">阻塞唤醒</text><text x="930" y="287" class="small">LockSupport</text>
  <line x1="500" y1="154" x2="195" y2="235" class="line"/><line x1="535" y1="154" x2="450" y2="235" class="line"/><line x1="585" y1="154" x2="700" y2="235" class="line"/><line x1="625" y1="154" x2="930" y2="235" class="line"/>
  <rect x="230" y="390" width="130" height="54" rx="10" fill="#ffffff" stroke="#64748b" class="node"/><text x="295" y="423" class="txt">Node1</text>
  <rect x="430" y="390" width="130" height="54" rx="10" fill="#ffffff" stroke="#64748b" class="node"/><text x="495" y="423" class="txt">Node2</text>
  <rect x="630" y="390" width="130" height="54" rx="10" fill="#ffffff" stroke="#64748b" class="node"/><text x="695" y="423" class="txt">Node3</text>
  <line x1="360" y1="417" x2="430" y2="417" class="line"/><line x1="560" y1="417" x2="630" y2="417" class="line"/>
  <text x="550" y="480" class="small">拿锁失败入队并 park；释放锁后唤醒后继节点。公平锁先看队列，非公平锁先抢一次。</text>
</svg>
