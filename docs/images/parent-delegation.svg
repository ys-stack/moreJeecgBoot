<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" role="img" aria-label="双亲委派模型">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#607086" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">双亲委派模型</text>
  
  <rect x="250" y="70" width="260" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="380" y="98">Bootstrap ClassLoader</tspan><tspan x="380" y="118">启动类加载器</tspan></text>

  <rect x="250" y="170" width="260" height="64" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="380" y="198">Platform ClassLoader</tspan><tspan x="380" y="218">平台类加载器</tspan></text>

  <rect x="250" y="270" width="260" height="64" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="380" y="298">Application ClassLoader</tspan><tspan x="380" y="318">应用类加载器</tspan></text>

  <rect x="250" y="370" width="260" height="64" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="380" y="398">Custom ClassLoader</tspan><tspan x="380" y="418">自定义类加载器</tspan></text>
<line x1="380" y1="370" x2="380" y2="334" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="380" y="344" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">先委托父加载器</text>
<line x1="380" y1="270" x2="380" y2="234" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="380" y1="170" x2="380" y2="134" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
</svg>
