<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-label="CAS 与 ABA 问题">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 16px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 13px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1080" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">CAS：无锁更新与 ABA 风险</text>
  <rect x="70" y="140" width="180" height="70" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="160" y="170" class="txt">读取旧值 A</text><text x="160" y="193" class="small">expect = A</text>
  <rect x="325" y="140" width="180" height="70" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="415" y="170" class="txt">计算新值 B</text><text x="415" y="193" class="small">update = B</text>
  <rect x="580" y="140" width="180" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="670" y="170" class="txt">CAS 比较</text><text x="670" y="193" class="small">当前值仍是 A?</text>
  <rect x="835" y="140" width="180" height="70" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="925" y="170" class="txt">更新成功</text><text x="925" y="193" class="small">否则自旋重试</text>
  <line x1="250" y1="175" x2="325" y2="175" class="line"/><line x1="505" y1="175" x2="580" y2="175" class="line"/><line x1="760" y1="175" x2="835" y2="175" class="line"/>
  <rect x="180" y="320" width="210" height="70" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="285" y="349" class="txt">ABA</text><text x="285" y="372" class="small">A -> C -> A，被误判未变</text>
  <rect x="470" y="320" width="210" height="70" rx="12" fill="#ffffff" stroke="#2563eb" class="node"/><text x="575" y="349" class="txt">版本号</text><text x="575" y="372" class="small">AtomicStampedReference</text>
  <rect x="760" y="320" width="210" height="70" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="865" y="349" class="txt">适用场景</text><text x="865" y="372" class="small">计数、状态位、低冲突更新</text>
  <line x1="390" y1="355" x2="470" y2="355" class="line"/><line x1="680" y1="355" x2="760" y2="355" class="line"/>
</svg>
