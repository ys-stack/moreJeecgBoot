<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" role="img" aria-label="方法区实现变化">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#607086" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">方法区实现变化</text>
  
  <rect x="80" y="110" width="240" height="70" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="200" y="141">Java 7 及以前</tspan><tspan x="200" y="161">方法区常由永久代实现</tspan></text>

  <rect x="440" y="110" width="240" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="560" y="141">Java 8 以后</tspan><tspan x="560" y="161">移除永久代，改为元空间</tspan></text>
<line x1="320" y1="145" x2="440" y2="145" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="380" y="137" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">演进</text>
</svg>
