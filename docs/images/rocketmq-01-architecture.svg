<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" role="img" aria-label="RocketMQ 架构与消息流">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="470" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">RocketMQ 架构：路由发现、顺序写存储、消费重试</text>
  <rect x="70" y="205" width="150" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="145" y="232" class="txt">Producer</text><text x="145" y="253" class="small">发送消息</text>
  <rect x="330" y="85" width="180" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="420" y="112" class="txt">NameServer</text><text x="420" y="133" class="small">Topic 路由发现</text>
  <rect x="370" y="205" width="190" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="465" y="232" class="txt">Broker</text><text x="465" y="253" class="small">存储 / 转发 / 重试</text>
  <rect x="640" y="135" width="170" height="56" rx="10" fill="#ffffff" stroke="#d97706" class="node"/><text x="725" y="168" class="txt">CommitLog</text>
  <rect x="640" y="225" width="170" height="56" rx="10" fill="#ffffff" stroke="#7c3aed" class="node"/><text x="725" y="258" class="txt">ConsumeQueue</text>
  <rect x="640" y="315" width="170" height="56" rx="10" fill="#ffffff" stroke="#0284c7" class="node"/><text x="725" y="348" class="txt">IndexFile</text>
  <rect x="900" y="205" width="150" height="66" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="975" y="232" class="txt">Consumer</text><text x="975" y="253" class="small">消费 / ACK / 重试</text>
  <line x1="220" y1="238" x2="370" y2="238" class="line"/><line x1="560" y1="238" x2="900" y2="238" class="line"/><line x1="465" y1="205" x2="420" y2="151" class="line"/><line x1="145" y1="205" x2="330" y2="118" class="line"/><line x1="560" y1="238" x2="640" y2="163" class="line"/><line x1="560" y1="238" x2="640" y2="253" class="line"/><line x1="560" y1="238" x2="640" y2="343" class="line"/>
  <text x="560" y="425" class="small">高频追问：RocketMQ 通常保证至少一次投递，消费端必须幂等；顺序消息本质是同业务 key 路由到同一队列。</text>
</svg>
