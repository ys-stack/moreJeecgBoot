<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-label="Spring Cloud 微服务治理地图">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 24px 'Microsoft YaHei',Arial;fill:#172033}.txt{font:700 15px 'Microsoft YaHei',Arial;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial;fill:#64748b;text-anchor:middle}.node{filter:url(#shadow);stroke-width:2}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="520" rx="18" fill="#f8fafc"/>
  <text x="32" y="44" class="title">Spring Cloud：微服务拆分后的治理能力</text>
  <rect x="65" y="205" width="155" height="66" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="142" y="232" class="txt">外部流量</text><text x="142" y="253" class="small">Web / App / OpenAPI</text>
  <rect x="285" y="205" width="160" height="66" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="365" y="232" class="txt">Gateway</text><text x="365" y="253" class="small">路由 / 鉴权 / 限流</text>
  <rect x="520" y="95" width="170" height="66" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="605" y="122" class="txt">注册中心</text><text x="605" y="143" class="small">服务列表 / 心跳</text>
  <rect x="520" y="205" width="170" height="66" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="605" y="232" class="txt">服务调用</text><text x="605" y="253" class="small">Feign / LoadBalancer</text>
  <rect x="520" y="315" width="170" height="66" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="605" y="342" class="txt">配置中心</text><text x="605" y="363" class="small">动态配置 / 审计</text>
  <rect x="765" y="120" width="155" height="66" rx="12" fill="#ffffff" stroke="#16a34a" class="node"/><text x="842" y="147" class="txt">Service A</text><text x="842" y="168" class="small">熔断 / 降级</text>
  <rect x="765" y="225" width="155" height="66" rx="12" fill="#ffffff" stroke="#d97706" class="node"/><text x="842" y="252" class="txt">Service B</text><text x="842" y="273" class="small">超时 / 重试</text>
  <rect x="765" y="330" width="155" height="66" rx="12" fill="#ffffff" stroke="#0284c7" class="node"/><text x="842" y="357" class="txt">Service C</text><text x="842" y="378" class="small">灰度 / 隔离</text>
  <rect x="975" y="225" width="145" height="66" rx="12" fill="#fee2e2" stroke="#dc2626" class="node"/><text x="1047" y="252" class="txt">观测体系</text><text x="1047" y="273" class="small">Trace / Metrics / Logs</text>
  <line x1="220" y1="238" x2="285" y2="238" class="line"/><line x1="445" y1="238" x2="520" y2="238" class="line"/><line x1="690" y1="238" x2="765" y2="153" class="line"/><line x1="690" y1="238" x2="765" y2="258" class="line"/><line x1="690" y1="238" x2="765" y2="363" class="line"/><line x1="605" y1="205" x2="605" y2="161" class="line"/><line x1="605" y1="271" x2="605" y2="315" class="line"/><line x1="920" y1="258" x2="975" y2="258" class="line"/>
</svg>
