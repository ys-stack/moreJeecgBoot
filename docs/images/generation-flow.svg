<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="分代收集与对象晋升">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#607086" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">分代收集与对象晋升</text>
  
  <rect x="50" y="135" width="120" height="54" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="110" y="168">新对象</tspan></text>

  <rect x="240" y="135" width="120" height="54" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="300" y="168">Eden</tspan></text>

  <rect x="470" y="135" width="130" height="54" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="535" y="168">Survivor</tspan></text>

  <rect x="730" y="135" width="120" height="54" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="790" y="168">老年代</tspan></text>
<line x1="170" y1="162" x2="240" y2="162" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="360" y1="162" x2="470" y2="162" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="415" y="154" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">Young GC 存活</text>
<line x1="600" y1="162" x2="730" y2="162" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/><text x="665" y="154" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">达到年龄阈值</text>
<path d="M535 135 C535 72, 665 72, 665 135" fill="none" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="600" y="78" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#607086" text-anchor="middle">年龄增加</text>
<path d="M300 189 C380 250, 650 250, 750 189" fill="none" stroke="#d97706" stroke-width="2.2" marker-end="url(#arrow)"/>
<text x="525" y="258" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="600" fill="#d97706" text-anchor="middle">大对象可能直接进入老年代</text>
</svg>
