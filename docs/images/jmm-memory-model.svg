  </defs>
  <rect width="100%" height="100%" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#172033">JMM 主内存与工作内存</text>
  
  <rect x="320" y="80" width="220" height="70" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="430" y="111">主内存</tspan><tspan x="430" y="131">共享变量</tspan></text>

  <rect x="80" y="250" width="190" height="62" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="175" y="287">线程 A 工作内存</tspan></text>

  <rect x="335" y="250" width="190" height="62" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="430" y="287">线程 B 工作内存</tspan></text>

  <rect x="590" y="250" width="190" height="62" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="600" fill="#172033" text-anchor="middle"><tspan x="685" y="287">线程 C 工作内存</tspan></text>
<line x1="360" y1="150" x2="175" y2="250" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="175" y1="258" x2="360" y2="158" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="430" y1="150" x2="430" y2="250" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="430" y1="258" x2="430" y2="158" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="500" y1="150" x2="685" y2="250" stroke="#607086" stroke-width="2.2" marker-end="url(#arrow)"/>
