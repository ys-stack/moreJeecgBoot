<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-label="Spring 整合 MyBatis">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 15px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1120" height="500" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring 整合 MyBatis：Mapper 如何变成 Bean</text>
  <rect x="70" y="205" width="180" height="70" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="160" y="233" class="txt">@MapperScan</text><text x="160" y="255" class="small">扫描接口</text>
  <rect x="315" y="205" width="190" height="70" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="410" y="233" class="txt">MapperFactoryBean</text><text x="410" y="255" class="small">注册 BeanDefinition</text>
  <rect x="570" y="205" width="180" height="70" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="660" y="233" class="txt">SqlSessionTemplate</text><text x="660" y="255" class="small">线程安全代理</text>
  <rect x="815" y="205" width="220" height="70" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="925" y="233" class="txt">SqlSessionFactory</text><text x="925" y="255" class="small">创建 SqlSession / Executor</text>
  <line x1="250" y1="240" x2="315" y2="240" class="line"/><line x1="505" y1="240" x2="570" y2="240" class="line"/><line x1="750" y1="240" x2="815" y2="240" class="line"/>
  <rect x="215" y="360" width="250" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="340" y="394" class="txt">Mapper 接口注入 Service</text>
  <rect x="655" y="360" width="250" height="58" rx="10" fill="#ffffff" stroke="#e11d48" class="node"/><text x="780" y="394" class="txt">事务连接由 Spring 管理</text>
  <text x="560" y="105" class="small">SqlSessionTemplate 是关键：它根据当前事务上下文获取 SqlSession，保证同一事务内复用同一个连接。</text>
</svg>
