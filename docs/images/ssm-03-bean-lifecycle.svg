<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="460" viewBox="0 0 1180 460" role="img" aria-label="Spring Bean 生命周期">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#64748b"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/></filter><style>.title{font:700 22px 'Microsoft YaHei',Arial,sans-serif;fill:#172033}.node{filter:url(#shadow);stroke-width:2}.txt{font:700 14px 'Microsoft YaHei',Arial,sans-serif;fill:#172033;text-anchor:middle}.small{font:600 12px 'Microsoft YaHei',Arial,sans-serif;fill:#64748b;text-anchor:middle}.line{stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="1180" height="460" rx="18" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Spring Bean 生命周期</text>
  <rect x="45" y="160" width="120" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" class="node"/><text x="105" y="197" class="txt">实例化</text>
  <rect x="210" y="160" width="120" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" class="node"/><text x="270" y="197" class="txt">属性填充</text>
  <rect x="375" y="160" width="145" height="64" rx="12" fill="#fef3c7" stroke="#d97706" class="node"/><text x="447" y="187" class="txt">Aware 回调</text><text x="447" y="208" class="small">BeanName/Factory</text>
  <rect x="565" y="160" width="145" height="64" rx="12" fill="#ede9fe" stroke="#7c3aed" class="node"/><text x="637" y="187" class="txt">初始化前 BPP</text><text x="637" y="208" class="small">postBefore</text>
  <rect x="755" y="160" width="145" height="64" rx="12" fill="#ffe4e6" stroke="#e11d48" class="node"/><text x="827" y="187" class="txt">初始化</text><text x="827" y="208" class="small">@PostConstruct</text>
  <rect x="945" y="160" width="145" height="64" rx="12" fill="#e0f2fe" stroke="#0284c7" class="node"/><text x="1017" y="187" class="txt">初始化后 BPP</text><text x="1017" y="208" class="small">AOP 代理</text>
  <line x1="165" y1="192" x2="210" y2="192" class="line"/><line x1="330" y1="192" x2="375" y2="192" class="line"/><line x1="520" y1="192" x2="565" y2="192" class="line"/><line x1="710" y1="192" x2="755" y2="192" class="line"/><line x1="900" y1="192" x2="945" y2="192" class="line"/>
  <rect x="345" y="325" width="170" height="58" rx="10" fill="#ffffff" stroke="#16a34a" class="node"/><text x="430" y="359" class="txt">Bean 可用</text>
  <rect x="665" y="325" width="170" height="58" rx="10" fill="#ffffff" stroke="#e11d48" class="node"/><text x="750" y="359" class="txt">销毁回调</text>
  <line x1="1017" y1="224" x2="430" y2="325" class="line"/><line x1="515" y1="354" x2="665" y2="354" class="line"/>
  <text x="590" y="425" class="small">重点：AOP 代理通常在初始化后置处理器阶段生成；你拿到的 Bean 可能已经不是原始对象，而是代理对象。</text>
</svg>
